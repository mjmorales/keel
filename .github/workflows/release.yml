name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.0.0, without v prefix)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.bump.outputs.skip }}
      new_version: ${{ steps.bump.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Manual override via workflow_dispatch
          if [ -n "${{ inputs.version }}" ]; then
            echo "new_version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual version override: ${{ inputs.version }}"
            exit 0
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
            LATEST_TAG="v0.0.0"
            echo "No tags found. Starting from 0.0.0."
          else
            CURRENT="${LATEST_TAG#v}"
          fi

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|docs|refactor|perf|style|build|chore|test)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST_TAG="${{ steps.bump.outputs.latest_tag }}"

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          {
            echo "changelog<<CHANGELOG_EOF"

            BREAKING=$(git log --pretty=format:"%s" "$RANGE" | grep -iE "^[a-z]+(\(.+\))?!:" || true)
            BREAKING_BODY=$(git log --pretty=format:"%b" "$RANGE" | grep -A1 "BREAKING CHANGE:" | grep -v "^--$" || true)
            if [ -n "$BREAKING" ] || [ -n "$BREAKING_BODY" ]; then
              echo "### Breaking Changes"
              [ -n "$BREAKING" ] && echo "$BREAKING" | sed 's/^/- /'
              [ -n "$BREAKING_BODY" ] && echo "$BREAKING_BODY" | sed 's/^/- /'
              echo ""
            fi

            FEATURES=$(git log --pretty=format:"- %s (%h)" "$RANGE" | grep -E "^- feat" || true)
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES"
              echo ""
            fi

            OTHER=$(git log --pretty=format:"- %s (%h)" "$RANGE" | grep -E "^- (docs|refactor|perf|style|build|chore|test)" || true)
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Tag and Publish
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          NEW_VERSION="v${{ needs.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${NEW_VERSION}"
          git push origin "${NEW_VERSION}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.version.outputs.new_version }}"
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --notes "${{ needs.version.outputs.changelog }}"

  ghcr:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [version, publish]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/mjmorales/keel
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.version.outputs.new_version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.version.outputs.new_version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cli/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ needs.version.outputs.new_version }}

  homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [version, ghcr]
    steps:
      - name: Generate formula
        env:
          VERSION: ${{ needs.version.outputs.new_version }}
          REPO: ${{ github.repository }}
        run: |
          TAG_URL="https://github.com/${REPO}/archive/refs/tags/v${VERSION}.tar.gz"
          SHA=$(curl -sL "${TAG_URL}" | sha256sum | awk '{print $1}')
          cat > keel.rb <<FORMULA
          class Keel < Formula
            include Language::Python::Virtualenv

            desc "Architectural contract enforcement for LLM-driven codebases"
            homepage "https://github.com/${REPO}"
            url "${TAG_URL}"
            sha256 "${SHA}"
            license "MIT"

            depends_on "python@3.12"

            def install
              venv = virtualenv_create(libexec, "python3.12")
              ENV["SETUPTOOLS_SCM_PRETEND_VERSION"] = version.to_s
              venv.pip_install buildpath/"cli"
              bin.install_symlink Dir[libexec/"bin/keel"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/keel --version")
            end
          end
          FORMULA

      - name: Push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.new_version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/mjmorales/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp keel.rb tap/Formula/keel.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/keel.rb
          git diff --cached --quiet && exit 0
          git commit -m "keel ${VERSION}"
          git push
