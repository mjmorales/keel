name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install ./cli

      - name: Run ruff check
        run: |
          pip install ruff
          ruff check cli/src/ cli/tests/

      - name: Run ruff format check
        run: ruff format --check cli/src/ cli/tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install ./cli

      - name: Smoke test
        run: |
          keel --version
          keel --help

      - name: Run tests
        run: |
          pip install pytest
          pytest cli/tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cli/Dockerfile
          push: false
          tags: ghcr.io/mjmorales/keel:ci
